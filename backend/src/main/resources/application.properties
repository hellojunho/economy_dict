spring.application.name=economy-dict

spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:9001/economy_dict}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:postgres}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:postgres}

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true

spring.batch.jdbc.initialize-schema=always

spring.servlet.multipart.max-file-size=20MB
spring.servlet.multipart.max-request-size=20MB

logging.file.path=${LOG_PATH:backend/logs}
app.error-log.storage-path=${APP_ERROR_LOG_STORAGE_PATH:${LOG_PATH:backend/logs}}
app.chat.storage-path=${APP_CHAT_STORAGE_PATH:backend/chats}

app.jwt.secret=${secrets.app.jwt.secret:${APP_JWT_SECRET:CHANGE_ME_JWT_SECRET_32_BYTES_MINIMUM_1234567890}}
app.jwt.expiration-ms=${APP_JWT_EXPIRATION_MS:86400000}

openai.api.base-url=${secrets.openai.api.base-url:${OPENAI_API_BASE_URL:https://api.openai.com}}
openai.api.key=${secrets.openai.api.key:${OPENAI_API_KEY:REPLACE_ME}}
openai.api.model=${secrets.openai.api.model:${OPENAI_API_MODEL:gpt-4o-mini}}
stock.kis.base-url=${secrets.stock.kis.base-url:${STOCK_KIS_BASE_URL:https://openapi.koreainvestment.com:9443}}
stock.kis.app-key=${secrets.stock.kis.app-key:${STOCK_KIS_APP_KEY:REPLACE_ME}}
stock.kis.app-secret=${secrets.stock.kis.app-secret:${STOCK_KIS_APP_SECRET:REPLACE_ME}}
stock.kis.market-code=${secrets.stock.kis.market-code:${STOCK_KIS_MARKET_CODE:J}}
stock.kis.product-type-code=${secrets.stock.kis.product-type-code:${STOCK_KIS_PRODUCT_TYPE_CODE:300}}
stock.kis.live-refresh-seconds=${STOCK_KIS_LIVE_REFRESH_SECONDS:2}

server.port=${BACKEND_PORT:8081}
