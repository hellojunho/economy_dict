services:
  db:
    image: postgres:16
    ports:
      - "9001:5432"
    environment:
      POSTGRES_DB: economy_dict
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - db_data:/var/lib/postgresql/data

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    ports:
      - "8081:8081"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://db:5432/economy_dict
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: postgres
      LOG_PATH: /app/backend/logs
    depends_on:
      - db
    volumes:
      - ./backend/logs:/app/backend/logs
      - ./backend/chats:/app/backend/chats
      - ./secrets.json:/app/secrets.json:ro

  nginx:
    build:
      context: .
      dockerfile: docker/nginx/Dockerfile
    ports:
      - "4321:80"
    depends_on:
      - backend

volumes:
  db_data:
